<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>NP</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 100vw;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #111118;
    font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
    overflow: hidden;
    user-select: none;
    position: relative;
  }
  .answer {
    font-size: 36px;
    font-weight: 800;
    color: #4ade80;
    text-align: center;
    letter-spacing: 1px;
    text-shadow: 0 0 20px rgba(74, 222, 128, 0.3);
  }
  .answer.long {
    font-size: 16px;
    font-weight: 600;
    line-height: 1.4;
    padding: 0 12px;
    word-break: break-word;
  }
  .bar {
    position: absolute;
    bottom: 0;
    left: 0;
    height: 3px;
    background: linear-gradient(90deg, #3b82f6, #8b5cf6, #ec4899);
    animation: shrink 8s linear forwards;
  }
  @keyframes shrink {
    from { width: 100%; }
    to   { width: 0%; }
  }
</style>
</head>
<body>
  <div class="answer" id="ans"></div>
  <div class="bar"></div>
  <script src="answer-popup.js"></script>
</body>
</html>
